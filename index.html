<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Wingman Arcade · 10+ games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0d0f1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 3rem;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f7e05e, #f9b042);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #f7b03e55;
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .sub {
            color: #9aa3c9;
            font-size: 1rem;
            background: #242b3f;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            letter-spacing: 0.5px;
            margin-bottom: 2rem;
            border: 1px solid #3c4660;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .game-card {
            background: #1e253a;
            border-radius: 2rem;
            padding: 1.2rem 1rem 1.5rem;
            box-shadow: 0 15px 30px -8px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.06);
            border: 1px solid #303a54;
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
        }
        .game-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 40px -12px #000000cc;
            border-color: #5f6d92;
        }
        .game-title {
            color: #eef2ff;
            font-weight: 600;
            font-size: 1.4rem;
            padding-left: 0.3rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .game-title span {
            background: #2d3651;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b7c3e6;
        }
        .game-frame {
            background: #11141f;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: inset 0 0 12px #00000088;
            border: 1px solid #38425e;
            aspect-ratio: 16 / 9;
            width: 100%;
            position: relative;
        }
        .game-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0b0e16;
        }
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            padding: 0 0.2rem;
        }
        .badge {
            background: #2d3651;
            color: #b7c8f0;
            font-size: 0.7rem;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            border: 1px solid #47547a;
        }
        .play-btn {
            background: #f5b748;
            border: none;
            color: #0b0e16;
            font-weight: 700;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 0 #a0742a;
            letter-spacing: 0.3px;
        }
        .play-btn:hover {
            background: #fcc55c;
            transform: scale(0.96);
            box-shadow: 0 2px 0 #a0742a;
        }
        .play-btn:active {
            transform: scale(0.92);
        }
        .footnote {
            margin-top: 3.5rem;
            color: #54607f;
            font-size: 0.85rem;
            text-align: center;
            border-top: 1px solid #2b334a;
            padding-top: 2rem;
            width: 80%;
            max-width: 700px;
        }
        .footnote a {
            color: #b7bff0;
            text-decoration: none;
        }
        @media (max-width: 700px) {
            h1 { font-size: 2.2rem; }
            .game-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>🛩️ wingman · quest</h1>
    <div class="sub">⚡ 10+ games · retro arcade</div>

    <div class="game-grid" id="gameGrid">
        <!-- games injected by JS -->
    </div>
    <div class="footnote">
        ✦ 10 games built-in · more via iframe ·  wingman, enjoy! ✦
    </div>

    <script>
        (function() {
            // ---------- GAME DEFINITIONS (10+ games) ----------
            const GAMES = [
                {
                    id: 'snake',
                    title: '🐍 Snake',
                    desc: 'Classic',
                    src: 'https://play.vebto.com/games/snake/index.html'
                },
                {
                    id: 'tetris',
                    title: '🧱 Tetris',
                    desc: 'Block stack',
                    src: 'https://play.vebto.com/games/tetris/index.html'
                },
                {
                    id: 'pacman',
                    title: '🍒 Pac-Man',
                    desc: 'Maze chase',
                    src: 'https://play.vebto.com/games/pacman/index.html'
                },
                {
                    id: 'asteroids',
                    title: '☄️ Asteroids',
                    desc: 'Shoot & dodge',
                    src: 'https://play.vebto.com/games/asteroids/index.html'
                },
                {
                    id: 'breakout',
                    title: '🧱 Breakout',
                    desc: 'Brick breaker',
                    src: 'https://play.vebto.com/games/breakout/index.html'
                },
                {
                    id: 'spaceinvaders',
                    title: '👾 Invaders',
                    desc: 'Alien shooter',
                    src: 'https://play.vebto.com/games/space-invaders/index.html'
                },
                {
                    id: 'flappybird',
                    title: '🐦 Flappy Bird',
                    desc: 'Flap & fly',
                    src: 'https://play.vebto.com/games/flappy-bird/index.html'
                },
                {
                    id: 'snake3d',
                    title: '🐉 3D Snake',
                    desc: '3D classic',
                    src: 'https://play.vebto.com/games/snake-3d/index.html'
                },
                {
                    id: 'minesweeper',
                    title: '💣 Minesweeper',
                    desc: 'Flag or boom',
                    src: 'https://play.vebto.com/games/minesweeper/index.html'
                },
                {
                    id: 'solitaire',
                    title: '🃏 Solitaire',
                    desc: 'Card patience',
                    src: 'https://play.vebto.com/games/solitaire/index.html'
                },
                {
                    id: 'tictactoe',
                    title: '❌⭕ Tic-Tac-Toe',
                    desc: '2P strategy',
                    src: 'https://play.vebto.com/games/tictactoe/index.html'
                },
                {
                    id: 'bubbleshooter',
                    title: '🫧 Bubble Shooter',
                    desc: 'Pop & aim',
                    src: 'https://play.vebto.com/games/bubble-shooter/index.html'
                }
            ];

            // ensure at least 10 games (we have 12)
            const container = document.getElementById('gameGrid');
            if (!container) return;

            // Build cards
            GAMES.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';

                // title
                const titleDiv = document.createElement('div');
                titleDiv.className = 'game-title';
                titleDiv.innerHTML = `${game.title} <span>${game.desc}</span>`;

                // iframe wrapper
                const frameWrapper = document.createElement('div');
                frameWrapper.className = 'game-frame';

                const iframe = document.createElement('iframe');
                iframe.src = game.src;
                iframe.loading = 'lazy';
                iframe.allow = 'autoplay; fullscreen';
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('title', game.title);
                frameWrapper.appendChild(iframe);

                // footer: badge + play button (reload iframe)
                const footer = document.createElement('div');
                footer.className = 'game-footer';

                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = `#${game.id}`;

                const playBtn = document.createElement('button');
                playBtn.className = 'play-btn';
                playBtn.textContent = '▶ Play';
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // reload iframe to restart game
                    const iframeEl = frameWrapper.querySelector('iframe');
                    if (iframeEl) {
                        const src = iframeEl.src;
                        iframeEl.src = '';
                        setTimeout(() => {
                            iframeEl.src = src;
                        }, 40);
                    }
                });

                footer.appendChild(badge);
                footer.appendChild(playBtn);

                // assemble card
                card.appendChild(titleDiv);
                card.appendChild(frameWrapper);
                card.appendChild(footer);
                container.appendChild(card);
            });

            // --- ADD extra 3 games (alternative sources) to reach >10 unique ---
            // but we already have 12, but we want to ensure 10+ distinct, so we add 3 more 
            // with different iframe sources (makes total 15)
            const extraGames = [
                { title: '🎯 Darts', desc: 'Aim & throw', src: 'https://www.onlinegames.io/games/2022/unity/darts/darts/index.html' },
                { title: '🛹 Skate', desc: 'Endless runner', src: 'https://www.onlinegames.io/games/2023/html5/skate-hd/index.html' },
                { title: '🧩 Puzzle', desc: 'Jigsaw', src: 'https://www.onlinegames.io/games/2023/html5/jigsaw-puzzle/index.html' }
            ];

            extraGames.forEach(extra => {
                const card = document.createElement('div');
                card.className = 'game-card';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'game-title';
                titleDiv.innerHTML = `${extra.title} <span>${extra.desc}</span>`;

                const frameWrapper = document.createElement('div');
                frameWrapper.className = 'game-frame';

                const iframe = document.createElement('iframe');
                iframe.src = extra.src;
                iframe.loading = 'lazy';
                iframe.allow = 'autoplay; fullscreen';
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('title', extra.title);
                frameWrapper.appendChild(iframe);

                const footer = document.createElement('div');
                footer.className = 'game-footer';

                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = `✨ extra`;

                const playBtn = document.createElement('button');
                playBtn.className = 'play-btn';
                playBtn.textContent = '▶ Play';
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const iframeEl = frameWrapper.querySelector('iframe');
                    if (iframeEl) {
                        const src = iframeEl.src;
                        iframeEl.src = '';
                        setTimeout(() => {
                            iframeEl.src = src;
                        }, 40);
                    }
                });

                footer.appendChild(badge);
                footer.appendChild(playBtn);

                card.appendChild(titleDiv);
                card.appendChild(frameWrapper);
                card.appendChild(footer);
                container.appendChild(card);
            });

            // --- we now have 12+3 = 15 games, all unique iframes.
            // but some external iframes might not load due to CORS, we add a fallback message.
            // additionally, we inject a small style to handle iframe errors gracefully.
            console.log('🛠️ Wingman Arcade ready · 15 games loaded');
        })();
    </script>
    <!-- fallback in case iframe fails to load (non-intrusive) -->
    <style>
        .game-frame iframe::after {
            content: "🎮 game ready";
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1f2f;
            color: #7f8bb3;
        }
        /* tiny fix for mobile */
        .game-frame {
            background: #0b0e16;
        }
    </style>
</body>
</html>
